<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Throw Ball Web</title>
    <style>
      :root {
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        background: #ffffff;
        color: #111111;
      }

      .page {
        padding: 24px;
      }

      .header {
        display: flex;
        align-items: flex-start;
        gap: 20px;
        margin-bottom: 20px;
      }

      .name {
        margin: 0;
        font-size: 1.4rem;
        line-height: 1.2;
        white-space: nowrap;
      }

      .bio {
        max-width: 560px;
        margin: 0;
        line-height: 1.5;
      }

      .controls {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 12px;
      }

      .control-button {
        border: 1px solid #222222;
        background: #f4f4f4;
        color: #111111;
        border-radius: 6px;
        padding: 6px 10px;
        cursor: pointer;
        font-size: 0.95rem;
      }

      .control-button:hover {
        background: #e8e8e8;
      }

      #app {
        display: inline-block;
      }

      @media (max-width: 860px) {
        .header {
          flex-direction: column;
          gap: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="header">
        <h1 class="name">CHARLIE O'KEEFE</h1>
        <p class="bio">
          I want to learn about everything.<br />
          I will never stop working hard to learn.<br />
          My ultimate goal is to help other people.
        </p>
      </section>
      <div id="app"></div>
      <section class="controls">
        <button id="hud-toggle" class="control-button" type="button">Show HUD</button>
        <button id="music-toggle" class="control-button" type="button">Mute Music</button>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
