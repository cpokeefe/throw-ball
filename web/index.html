<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Throw Ball Web</title>
    <style>
      :root {
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        background: #ffffff;
        color: #111111;
      }

      .page {
        padding: 24px;
      }

      .header {
        display: flex;
        align-items: flex-start;
        gap: 20px;
        margin-bottom: 20px;
      }

      .name {
        margin: 0;
        font-size: 1.4rem;
        line-height: 1.2;
        white-space: nowrap;
      }

      .bio {
        max-width: 560px;
        margin: 0;
        line-height: 1.5;
      }

      #app {
        display: inline-block;
      }

      @media (max-width: 860px) {
        .header {
          flex-direction: column;
          gap: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="header">
        <h1 class="name">CHARLIE O'KEEFE</h1>
        <p class="bio">
          I want to learn about everything.
          I will never stop working hard to learn.
          My ultimate goal is to help other people.
        </p>
      </section>
      <div id="app"></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
