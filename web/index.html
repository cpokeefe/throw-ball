<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Throw Ball Web</title>
    <style>
      @font-face {
        font-family: "VeraMono";
        src: url("/fonts/VeraMono.ttf?v=2") format("truetype");
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "VeraMono";
        src: url("/fonts/VeraMoBd.ttf?v=2") format("truetype");
        font-weight: bold;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "VeraMono";
        src: url("/fonts/VeraMoIt.ttf?v=2") format("truetype");
        font-weight: normal;
        font-style: italic;
        font-display: swap;
      }
      @font-face {
        font-family: "VeraMono";
        src: url("/fonts/VeraMoBI.ttf?v=2") format("truetype");
        font-weight: bold;
        font-style: italic;
        font-display: swap;
      }

      :root {
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        background: #ffffff;
        color: #111111;
        /* overflow-x: hidden;
        overflow-y: hidden; */
        overflow: auto;
      }

      .page {
        padding: 24px 0 0;
        min-width: max-content;
      }

      .header {
        display: flex;
        align-items: flex-start;
        gap: 20px;
        padding: 0 24px;
        margin-bottom: 20px;
      }

      .name {
        margin: 0;
        font-size: 1.4rem;
        line-height: 1.2;
        white-space: nowrap;
      }

      .bio {
        max-width: 560px;
        margin: 0;
        line-height: 1.5;
      }

      .controls {
        display: flex;
        gap: 6px;
        align-items: center;
        justify-content: center;
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 1px;
        margin-top: 0;
        z-index: 20;
      }

      .controls .control-button {
        padding: 4px 8px;
        font-size: 0.8rem;
      }

      .hidden {
        display: none !important;
      }

      .control-button {
        border: 1px solid #222222;
        background: #f4f4f4;
        color: #111111;
        border-radius: 6px;
        padding: 6px 10px;
        cursor: pointer;
        font-size: 0.95rem;
      }

      .control-button:hover {
        background: #e8e8e8;
      }

      #app {
        display: block;
        width: fit-content;
        margin: 0 auto;
      }

      #app:fullscreen,
      #app:-webkit-full-screen {
        position: relative;
        width: 100vw;
        height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000000;
      }

      #app:fullscreen > canvas,
      #app:-webkit-full-screen > canvas {
        margin: auto;
        display: block;
      }

      /* ---- Fullscreen margin ads ---- */

      #ad-margins {
        display: none;
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 5;
        margin: 0 !important;
      }

      #ad-margins.visible {
        display: block;
      }

      .ad-region {
        position: absolute;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        pointer-events: none;
        transition: opacity var(--ad-fade-ms, 500ms) ease;
        opacity: 1;
      }

      .ad-card {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        border: 1px solid;
        border-radius: 8px;
        pointer-events: auto;
        user-select: none;
        font-family: 'VeraMono', monospace;
      }

      .ad-icon {
        line-height: 1;
        flex-shrink: 0;
      }

      .ad-text {
        display: inline-flex;
        flex-direction: column;
        gap: 1px;
      }

      .ad-title {
        font-weight: bold;
        white-space: nowrap;
      }

      .ad-tagline {
        white-space: nowrap;
      }

      .title-screen {
        width: var(--game-width, 1280px);
        height: var(--game-height, 720px);
        border: 1px solid #222222;
        border-radius: 0;
        background: var(--game-bg, #000000);
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
      }

      .play-button {
        width: 82px;
        height: 82px;
        border-radius: 50%;
        border: 3.5px solid #ffffff;
        background: #111821;
        color: #ffffff;
        font-size: 2.4rem;
        line-height: 1;
        display: grid;
        place-items: center;
      }

      .play-button:hover {
        background: #223041;
      }

      .loading-text {
        font-family: monospace;
        font-size: 1.2rem;
        margin: 0;
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      @media (max-width: 860px) {
        .header {
          flex-direction: column;
          gap: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="header">
        <h1 class="name">CHARLIE O'KEEFE</h1>
        <p class="bio">
          I want to learn about everything.<br />
          I will never stop working hard to learn.<br />
          My ultimate goal is to help other people.
        </p>
      </section>
      <section id="title-screen" class="title-screen">
        <button id="start-game" class="control-button play-button" type="button" aria-label="Start game">
          &#9654;
        </button>
      </section>
      <section id="loading-screen" class="title-screen hidden">
        <p class="loading-text">Loading...</p>
      </section>
      <div id="app"></div>
      <section id="game-controls" class="controls hidden">
        <button id="hud-toggle" class="control-button" type="button">Controls</button>
        <button id="music-toggle" class="control-button" type="button">Mute Music</button>
        <button id="fullscreen-toggle" class="control-button" type="button">Fullscreen</button>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
